name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies
        run: cd server && npm install

      - name: Run unit tests
        run: cd server && npm run test:unit

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    continue-on-error: true   # Non-blocking — types may have pre-existing issues
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies
        run: cd server && npm install

      - name: TypeScript compile check
        run: cd server && npx tsc --noEmit || true

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    continue-on-error: true   # Non-blocking
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies
        run: cd server && npm install

      - name: Lint
        run: cd server && npx eslint src/ --ext .ts || true
