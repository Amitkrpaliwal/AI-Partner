name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Install client dependencies
        run: cd client && npm ci

      - name: TypeScript compile check (server)
        run: cd server && npx tsc --noEmit

      - name: TypeScript compile check (client)
        run: cd client && npx tsc --noEmit || true  # Allow pre-existing @types issues

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci && cd server && npm ci && cd ../client && npm ci

      - name: Build server
        run: cd server && npm run build

      - name: Build client
        run: cd client && npm run build

  unit-tests-coverage:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci && cd server && npm ci

      - name: Run unit tests
        run: cd server && npm run test:unit

      - name: Run coverage (fails if below threshold)
        run: cd server && npm run test:coverage

  unit-tests:
    name: Unit & E2E Tests
    runs-on: ubuntu-latest
    needs: typecheck
    services:
      # SearXNG for search tests
      searxng:
        image: searxng/searxng:latest
        ports:
          - 8888:8080

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci && cd server && npm ci

      - name: Start server in background
        run: |
          cd server
          npx tsx src/index.ts &
          sleep 5
        env:
          NODE_ENV: test
          AUTH_ENABLED: "false"
          PORT: 3000
          SEARXNG_URL: http://localhost:8888

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000/api/health > /dev/null; then
              echo "Server is ready"
              break
            fi
            echo "Waiting for server... ($i)"
            sleep 2
          done

      - name: Run E2E tests
        run: cd server && npx vitest run src/tests/e2e/ --reporter=verbose
        env:
          API_BASE: http://localhost:3000

      - name: Run benchmarks
        run: cd server && npx vitest run src/tests/load/benchmarks.test.ts --reporter=verbose
        env:
          API_BASE: http://localhost:3000

  e2e-docker:
    name: E2E with Docker
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci && cd server && npm ci

      - name: Build sandbox image
        run: docker build -t ai-partner-sandbox -f docker/Dockerfile.sandbox .
        continue-on-error: true

      - name: Start server with Docker
        run: |
          cd server
          npx tsx src/index.ts &
          sleep 5
        env:
          NODE_ENV: test
          AUTH_ENABLED: "false"
          PORT: 3000

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000/api/health > /dev/null; then
              echo "Server is ready"
              break
            fi
            sleep 2
          done

      - name: Run container E2E tests
        run: cd server && npx vitest run src/tests/e2e/persistent-container.test.ts --reporter=verbose
        env:
          API_BASE: http://localhost:3000
        continue-on-error: true  # Docker may not be fully available in CI

      - name: Run load tests
        run: cd server && npx vitest run src/tests/load/ --reporter=verbose
        env:
          API_BASE: http://localhost:3000

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci && cd server && npm ci && cd ../client && npm ci

      - name: Lint server
        run: cd server && npx eslint src/ --ext .ts || true

      - name: Lint client
        run: cd client && npx eslint src/ --ext .ts,.tsx || true
