name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    env:
      # Skip browser/chromium downloads — not needed for unit tests
      PUPPETEER_SKIP_DOWNLOAD: "true"
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      # Skip husky git hooks (no .git context on CI runner)
      HUSKY: "0"
      # SQLite native build
      npm_config_python: python3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          # Lock file is at repo root (monorepo workspace)
          cache-dependency-path: package-lock.json

      - name: Install system dependencies (for native addons)
        run: sudo apt-get install -y python3 make g++

      # Install from repo ROOT so npm resolves the @ai-coworker/shared
      # workspace dependency correctly.
      #
      # We delete package-lock.json first because it was generated on Windows
      # and locks Windows-specific optional binaries (e.g. @rollup/rollup-win32-x64-msvc).
      # On Linux, npm would skip @rollup/rollup-linux-x64-gnu and rollup crashes at runtime.
      # Deleting the lock lets npm resolve the correct platform binaries fresh.
      - name: Install workspace dependencies
        run: rm -f package-lock.json && npm install --legacy-peer-deps --no-audit --no-fund
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
          HUSKY: "0"

      - name: Run unit tests
        working-directory: server
        run: npm run test:unit

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      PUPPETEER_SKIP_DOWNLOAD: "true"
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      HUSKY: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: sudo apt-get install -y python3 make g++

      - name: Install workspace dependencies
        run: rm -f package-lock.json && npm install --legacy-peer-deps --no-audit --no-fund
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
          HUSKY: "0"

      - name: TypeScript compile check
        working-directory: server
        run: npx tsc --noEmit || true
