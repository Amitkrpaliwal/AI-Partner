name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    env:
      # Skip browser downloads — not needed for unit tests
      PUPPETEER_SKIP_DOWNLOAD: "true"
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      # Skip husky git hooks (no .git context in CI)
      HUSKY: "0"
      # SQLite native build needs python
      npm_config_python: python3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          # Lock file lives at the repo root (monorepo workspace)
          cache-dependency-path: package-lock.json

      - name: Install system dependencies (for native addons)
        run: sudo apt-get install -y python3 make g++

      - name: Install server dependencies
        working-directory: server
        run: npm install --legacy-peer-deps --no-audit --no-fund
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
          HUSKY: "0"

      - name: Run unit tests
        working-directory: server
        run: npm run test:unit

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      PUPPETEER_SKIP_DOWNLOAD: "true"
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      HUSKY: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: sudo apt-get install -y python3 make g++

      - name: Install server dependencies
        working-directory: server
        run: npm install --legacy-peer-deps --no-audit --no-fund
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
          HUSKY: "0"

      - name: TypeScript compile check
        working-directory: server
        run: npx tsc --noEmit || true
