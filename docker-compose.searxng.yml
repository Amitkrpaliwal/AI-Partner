# SearXNG - Self-hosted meta-search engine for AI Partner
#
# Usage:
#   docker-compose -f docker-compose.searxng.yml up -d
#
# Accessible at: http://localhost:8888
# JSON API:      http://localhost:8888/search?q=test&format=json
#
# SearXNG aggregates results from multiple search engines (Google, Bing,
# DuckDuckGo, etc.) without sending user data to any of them.

version: '3.8'

services:
  searxng:
    image: searxng/searxng:latest
    container_name: aipartner_searxng
    restart: unless-stopped
    ports:
      - "8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    volumes:
      - searxng-data:/etc/searxng
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

volumes:
  searxng-data:
